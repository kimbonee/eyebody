<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>EYEBODY — 눈바디 변화 기록</title>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300C9B1'/%3E%3Cstop offset='100%25' stop-color='%230369A1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cellipse cx='50' cy='50' rx='48' ry='30' fill='none' stroke='url(%23g)' stroke-width='7'/%3E%3Ccircle cx='50' cy='50' r='16' fill='url(%23g)'/%3E%3Cpath d='M50 38 C50 38 44 42 44 50 C44 56 47 60 50 62 C53 60 56 56 56 50 C56 42 50 38 50 38Z' fill='white' opacity='0.9'/%3E%3Cellipse cx='50' cy='44' rx='5' ry='3' fill='white' opacity='0.5'/%3E%3C/svg%3E" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e1a; --surface: #16162a; --card: #1e1e35; --card2: #252540;
      --border: #2e2e50; --purple: #7c5cfc; --purple-light: #9b7dff;
      --purple-glow: rgba(124,92,252,0.25); --pink: #fc5ca0; --gold: #ffd700;
      --text: #f0f0ff; --text-dim: #8888aa; --text-muted: #555570;
      --radius: 16px; --radius-sm: 10px;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; overflow-x: hidden; }
    #root { max-width: 480px; margin: 0 auto; padding-bottom: 60px; }

    /* ── SPLASH ── */
    .splash {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(160deg, #e0faf6 0%, #b2ecec 30%, #5bc8c8 60%, #0891b2 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 32px 28px;
      animation: splashFadeOut 0.5s ease 2s forwards;
    }
    @keyframes splashFadeOut { to { opacity: 0; pointer-events: none; } }

    .splash-logo-wrap {
      width: 80px; height: 80px; margin-bottom: 14px;
    }
    .splash-logo-svg { width: 100%; height: 100%; }

    .splash-brand {
      font-size: 36px; font-weight: 900; letter-spacing: 3px;
      color: #0c4a6e; margin-bottom: 24px;
    }

    .splash-hero {
      width: 100%; border-radius: 20px; overflow: hidden;
      background: linear-gradient(135deg, #0c4a6e 0%, #0369a1 40%, #0e7490 100%);
      padding: 24px 20px 20px; margin-bottom: 28px;
      position: relative;
    }
    .splash-hero-headline {
      font-size: 28px; font-weight: 900; color: #fff;
      line-height: 1.2; margin-bottom: 16px; letter-spacing: -0.5px;
    }
    .splash-silhouettes {
      display: flex; gap: 12px; align-items: flex-end; justify-content: center;
      margin-bottom: 4px;
    }
    .silhouette-card {
      background: rgba(255,255,255,0.12); border-radius: 12px;
      padding: 8px; display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .silhouette-date { font-size: 10px; color: rgba(255,255,255,0.6); }
    .silhouette-svg { width: 44px; height: 72px; }

    .splash-tagline {
      font-size: 18px; color: #164e63; font-weight: 700; text-align: center; margin-bottom: 8px;
    }
    .splash-sub {
      font-size: 14px; color: #0e7490; text-align: center; margin-bottom: 32px; line-height: 1.5;
    }

    .splash-btn-primary {
      width: 100%; padding: 16px; border-radius: 50px;
      background: linear-gradient(90deg, #0891b2, #0e9488);
      border: none; color: #fff; font-size: 16px; font-weight: 800;
      letter-spacing: 1.5px; cursor: pointer;
      box-shadow: 0 6px 24px rgba(8,145,178,0.4);
      margin-bottom: 12px;
    }
    .splash-btn-secondary {
      width: 100%; padding: 15px; border-radius: 50px;
      background: transparent; border: 2px solid #0891b2;
      color: #0891b2; font-size: 16px; font-weight: 800;
      letter-spacing: 1.5px; cursor: pointer;
    }

    /* ── ABOUT SECTION ── */
    .about-card {
      background: linear-gradient(135deg, #0c1a2e 0%, #0f2744 100%);
      border-radius: var(--radius); border: 1px solid rgba(8,145,178,0.3);
      overflow: hidden; margin-bottom: 0;
    }
    .about-hero-band {
      background: linear-gradient(90deg, #0891b2, #0e9488);
      padding: 18px 20px; display: flex; align-items: center; gap: 14px;
    }
    .about-logo-small { width: 44px; height: 44px; flex-shrink: 0; }
    .about-brand-text .about-brand-name { font-size: 20px; font-weight: 900; color: #fff; letter-spacing: 2px; }
    .about-brand-text .about-brand-sub { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 2px; }
    .about-body { padding: 20px; }
    .about-features { display: flex; flex-direction: column; gap: 14px; }
    .about-feature {
      display: flex; align-items: flex-start; gap: 12px;
      background: rgba(255,255,255,0.04); border-radius: 12px; padding: 14px;
      border: 1px solid rgba(8,145,178,0.15);
    }
    .about-feature-icon { font-size: 26px; flex-shrink: 0; margin-top: 2px; }
    .about-feature-text .af-title { font-size: 14px; font-weight: 700; color: #7dd3fc; margin-bottom: 3px; }
    .about-feature-text .af-desc { font-size: 12px; color: var(--text-dim); line-height: 1.5; }

    /* HEADER */
    .header { background: linear-gradient(135deg, #1a0a3e 0%, #0e0e1a 60%); padding: 28px 20px 20px; position: relative; overflow: hidden; }
    .header::before { content: ''; position: absolute; top: -60px; right: -60px; width: 200px; height: 200px; background: radial-gradient(circle, var(--purple-glow) 0%, transparent 70%); pointer-events: none; }
    .header-row { display: flex; align-items: center; justify-content: space-between; }
    .app-brand { display: flex; align-items: center; gap: 10px; }
    .app-logo { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
    .app-title { font-size: 22px; font-weight: 900; letter-spacing: 2px; color: #fff; }
    .app-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .countdown-badge { background: linear-gradient(135deg, var(--purple), var(--pink)); padding: 8px 16px; border-radius: 20px; font-size: 18px; font-weight: 800; letter-spacing: -0.5px; box-shadow: 0 4px 20px var(--purple-glow); cursor: pointer; user-select: none; }
    .countdown-badge.urgent { background: linear-gradient(135deg, #ff4444, var(--pink)); animation: pulse 1.5s infinite; }
    .countdown-badge.achieved { background: linear-gradient(135deg, #22c55e, #16a34a); }
    @keyframes pulse { 0%,100%{box-shadow:0 4px 20px rgba(255,68,68,0.3)} 50%{box-shadow:0 4px 30px rgba(255,68,68,0.6)} }

    /* GOAL BAR */
    .goal-bar { background: var(--surface); margin: 12px 16px 0; border-radius: var(--radius-sm); border: 1px solid var(--border); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
    .goal-bar-left { display: flex; align-items: center; gap: 8px; }
    .goal-emoji { font-size: 20px; }
    .goal-info .goal-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
    .goal-info .goal-date-val { font-size: 15px; font-weight: 700; color: var(--text); margin-top: 2px; }
    .btn-set-goal { background: linear-gradient(135deg, var(--purple), var(--purple-light)); border: none; border-radius: 20px; padding: 8px 20px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 14px var(--purple-glow); transition: opacity 0.2s; }
    .btn-set-goal:hover { opacity: 0.85; }
    .btn-change { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 5px 12px; color: var(--text-dim); font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .btn-change:hover { color: var(--text); border-color: var(--purple); }

    /* SECTION */
    .section { margin: 12px 16px; }
    .section-title { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 6px; margin-bottom: 12px; }
    .section-title .badge { font-size: 11px; font-weight: 600; background: var(--purple-glow); color: var(--purple-light); border: 1px solid rgba(124,92,252,0.3); padding: 2px 8px; border-radius: 20px; }

    /* UPLOAD */
    .upload-card-wrapper { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; }
    .upload-date-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .upload-date-label { font-size: 13px; color: var(--text-dim); }
    .upload-date-val { font-size: 13px; font-weight: 600; color: var(--purple-light); }
    .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .upload-zone { aspect-ratio: 3/4; border-radius: var(--radius-sm); border: 2px dashed var(--border); cursor: pointer; position: relative; overflow: hidden; transition: all 0.2s; background: var(--card); }
    .upload-zone:hover { border-color: var(--purple); background: var(--card2); }
    .upload-zone.has-photo { border-style: solid; border-color: var(--purple); }
    .upload-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
    .upload-plus { width: 44px; height: 44px; background: linear-gradient(135deg, var(--purple), var(--purple-light)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff; font-weight: 300; box-shadow: 0 4px 14px var(--purple-glow); }
    .upload-type-label { font-size: 13px; font-weight: 600; color: var(--text-dim); }
    .upload-hint { font-size: 11px; color: var(--text-muted); }
    .preview-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%); display: flex; align-items: flex-end; padding: 8px; opacity: 0; transition: opacity 0.2s; }
    .upload-zone:hover .photo-overlay { opacity: 1; }
    .re-upload-label { font-size: 11px; color: #fff; font-weight: 600; }

    /* CALENDAR */
    .calendar-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
    .cal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 16px 12px; }
    .cal-title { font-size: 17px; font-weight: 700; }
    .cal-nav { background: var(--card); border: 1px solid var(--border); border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--text); cursor: pointer; transition: all 0.2s; }
    .cal-nav:hover { background: var(--purple); border-color: var(--purple); }
    .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); padding: 0 8px; }
    .cal-weekday { text-align: center; font-size: 11px; font-weight: 600; color: var(--text-muted); padding: 6px 0; }
    .cal-weekday:first-child { color: #ff6b6b; }
    .cal-weekday:last-child { color: #6b9fff; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 0 8px 8px; gap: 2px; }
    .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; position: relative; transition: all 0.15s; font-size: 13px; }
    .cal-day:not(.empty):hover { background: var(--card2); }
    .cal-day.empty { cursor: default; }
    .cal-day.is-today .day-num { color: var(--purple-light); font-weight: 700; }
    .cal-day.is-selected { background: var(--purple-glow); border: 1px solid rgba(124,92,252,0.4); }
    .cal-day.is-goal .day-num { color: var(--gold) !important; font-weight: 800; }
    .cal-day.selectable { background: rgba(124,92,252,0.12); }
    .cal-day.selectable:hover { background: rgba(124,92,252,0.28); }
    .cal-day.is-before-pick { background: rgba(255,80,80,0.2); border: 1px solid rgba(255,80,80,0.4); }
    .cal-day.is-after-pick { background: rgba(124,92,252,0.2); border: 1px solid rgba(124,92,252,0.4); }
    .cal-day:nth-child(7n+1) .day-num { color: #ff6b6b; }
    .cal-day:nth-child(7n) .day-num { color: #6b9fff; }
    .day-num { font-size: 13px; line-height: 1; }
    .day-dot-row { display: flex; gap: 2px; margin-top: 3px; height: 6px; align-items: center; }
    .day-dot { width: 5px; height: 5px; border-radius: 50%; }
    .goal-flag { font-size: 10px; line-height: 1; margin-top: 2px; }
    .select-mode-banner { background: linear-gradient(90deg, rgba(124,92,252,0.2), rgba(252,92,160,0.1)); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; font-size: 13px; }
    .select-mode-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
    .select-mode-badge.before { background: rgba(255,80,80,0.25); color: #ff8080; }
    .select-mode-badge.after { background: rgba(124,92,252,0.25); color: var(--purple-light); }
    .btn-cancel-select { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; color: var(--text-dim); font-size: 12px; cursor: pointer; }
    .selected-panel { border-top: 1px solid var(--border); padding: 16px; animation: slideDown 0.2s ease; }
    @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    .selected-panel-title { font-size: 13px; color: var(--text-dim); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .selected-panel-title strong { color: var(--text); }
    .selected-photos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .selected-photo { aspect-ratio: 3/4; border-radius: var(--radius-sm); object-fit: cover; width: 100%; }
    .selected-no-photo { aspect-ratio: 3/4; border-radius: var(--radius-sm); background: var(--card); border: 1px dashed var(--border); display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 12px; }

    /* COMPARISON */
    .comparison-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
    .comparison-header-row { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--border); }
    .comp-col-label { padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; }
    .comp-col-label.before { background: rgba(255,100,100,0.08); border-right: 1px solid var(--border); }
    .comp-col-label.after { background: rgba(124,92,252,0.08); }
    .comp-col-info { display: flex; flex-direction: column; gap: 2px; }
    .comp-col-title { font-size: 12px; font-weight: 700; letter-spacing: 0.5px; }
    .comp-col-label.before .comp-col-title { color: #ff6b6b; }
    .comp-col-label.after .comp-col-title { color: var(--purple-light); }
    .comp-col-date { font-size: 10px; color: var(--text-dim); }
    .btn-pick-date { background: rgba(255,255,255,0.08); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; font-size: 11px; color: var(--text-dim); cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .btn-pick-date:hover { color: var(--text); border-color: var(--purple); }
    .btn-pick-date.active-before { background: rgba(255,80,80,0.2); border-color: #ff6b6b; color: #ff8080; }
    .btn-pick-date.active-after { background: rgba(124,92,252,0.2); border-color: var(--purple); color: var(--purple-light); }
    .comparison-grid { display: grid; grid-template-columns: 1fr 1fr; }
    .comp-cell { position: relative; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .comp-cell:nth-child(2n) { border-right: none; }
    .comp-cell:nth-last-child(-n+2) { border-bottom: none; }
    .comp-cell img { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; }
    .comp-cell-empty { aspect-ratio: 3/4; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; background: var(--card); color: var(--text-muted); font-size: 12px; }
    .comp-row-label { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.65); backdrop-filter: blur(4px); border-radius: 6px; padding: 2px 8px; font-size: 11px; color: #fff; font-weight: 600; }
    .comparison-actions { padding: 14px 16px; border-top: 1px solid var(--border); }
    .btn-primary { width: 100%; background: linear-gradient(135deg, var(--purple), var(--purple-light)); border: none; border-radius: var(--radius-sm); padding: 13px 16px; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 18px var(--purple-glow); transition: opacity 0.2s, transform 0.1s; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.98); }
    .empty-comparison { padding: 48px 24px; text-align: center; }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-text { color: var(--text-dim); font-size: 14px; line-height: 1.6; }
    .empty-hint { color: var(--text-muted); font-size: 12px; margin-top: 6px; }

    /* MODALS */
    .modal-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); display: flex; align-items: flex-end; justify-content: center; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .modal { background: var(--surface); border-radius: 24px 24px 0 0; border: 1px solid var(--border); border-bottom: none; width: 100%; max-width: 480px; padding: 24px 20px 36px; animation: slideUp 0.25s ease; }
    @keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
    .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
    .modal-title { font-size: 20px; font-weight: 800; text-align: center; margin-bottom: 24px; }
    .date-picker-input { width: 100%; padding: 14px 16px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 16px; margin-bottom: 16px; outline: none; transition: border-color 0.2s; }
    .date-picker-input:focus { border-color: var(--purple); }

    /* DECORATE MODAL */
    .decorate-modal { border-radius: 24px 24px 0 0; max-height: 92vh; overflow-y: auto; }
    .decor-wrap {
      position: relative; width: 100%; aspect-ratio: 1;
      background: #000; border-radius: var(--radius-sm);
      overflow: hidden; margin-bottom: 16px;
      touch-action: none; user-select: none;
    }
    .decor-canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
    .decor-overlay { position: absolute; inset: 0; }
    .overlay-item {
      position: absolute;
      cursor: grab;
      user-select: none;
      touch-action: none;
      line-height: 1;
    }
    .overlay-item:active { cursor: grabbing; }
    .overlay-item.selected::after {
      content: '';
      position: absolute; inset: -4px;
      border: 2px dashed rgba(255,255,255,0.8);
      border-radius: 6px;
      pointer-events: none;
    }
    .item-delete {
      position: absolute; top: -28px; left: 50%; transform: translateX(-50%);
      background: rgba(220,50,50,0.9); border: none; border-radius: 20px;
      padding: 3px 10px; color: #fff; font-size: 11px; font-weight: 700;
      cursor: pointer; white-space: nowrap; z-index: 10;
    }
    .resize-handle {
      position: absolute; bottom: -10px; right: -10px;
      width: 20px; height: 20px;
      background: var(--purple); border: 2px solid #fff;
      border-radius: 50%; cursor: se-resize;
      touch-action: none; z-index: 10;
      display: flex; align-items: center; justify-content: center;
    }
    .resize-handle::after { content: '⤡'; color: #fff; font-size: 9px; }

    /* DECOR TABS */
    .decor-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
    .decor-tab { flex: 1; padding: 10px 4px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; color: var(--text-dim); cursor: pointer; transition: all 0.15s; text-align: center; }
    .decor-tab.active { background: var(--purple); border-color: var(--purple); color: #fff; }

    .control-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: block; }

    /* FONT GRID */
    .font-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px; }
    .font-btn { padding: 10px 4px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); text-align: center; cursor: pointer; transition: all 0.15s; font-size: 12px; color: var(--text-dim); line-height: 1.3; }
    .font-btn.active { background: var(--purple); border-color: var(--purple); color: #fff; }

    /* COLOR ROW */
    .color-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .color-swatch { width: 30px; height: 30px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: all 0.15s; }
    .color-swatch.active { border-color: #fff; transform: scale(1.2); box-shadow: 0 0 0 2px var(--purple); }

    /* TEXT INPUT ROW */
    .text-add-row { display: flex; gap: 8px; }
    .text-input { flex: 1; padding: 11px 14px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s; }

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ── IndexedDB Storage ──────────────────────────────────────
const DB_NAME = 'eyebody_db';
const DB_VER  = 1;
const STORE_META   = 'meta';    // goalDate, etc.
const STORE_PHOTOS = 'photos';  // key: "YYYY-MM-DD_front" / "YYYY-MM-DD_side", value: Blob

let _db = null;

function openDB() {
  if (_db) return Promise.resolve(_db);
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_META))   db.createObjectStore(STORE_META);
      if (!db.objectStoreNames.contains(STORE_PHOTOS)) db.createObjectStore(STORE_PHOTOS);
    };
    req.onsuccess = e => { _db = e.target.result; res(_db); };
    req.onerror   = e => rej(e.target.error);
  });
}

function dbGet(store, key) {
  return openDB().then(db => new Promise((res, rej) => {
    const tx  = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  }));
}

function dbPut(store, key, value) {
  return openDB().then(db => new Promise((res, rej) => {
    const tx  = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(value, key);
    req.onsuccess = () => res();
    req.onerror   = () => rej(req.error);
  }));
}

function dbDel(store, key) {
  return openDB().then(db => new Promise((res, rej) => {
    const tx  = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(key);
    req.onsuccess = () => res();
    req.onerror   = () => rej(req.error);
  }));
}

function dbGetAllKeys(store) {
  return openDB().then(db => new Promise((res, rej) => {
    const tx  = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAllKeys();
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  }));
}

function dbClearAll() {
  return openDB().then(db => new Promise((res, rej) => {
    const tx = db.transaction([STORE_META, STORE_PHOTOS], 'readwrite');
    tx.objectStore(STORE_META).clear();
    tx.objectStore(STORE_PHOTOS).clear();
    tx.oncomplete = () => res();
    tx.onerror    = () => rej(tx.error);
  }));
}

// blob → dataURL for display
function blobToDataURL(blob) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.readAsDataURL(blob);
  });
}

// dataURL → blob
function dataURLToBlob(dataURL) {
  const [header, data] = dataURL.split(',');
  const mime = header.match(/:(.*?);/)[1];
  const bytes = atob(data);
  const arr = new Uint8Array(bytes.length);
  for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

// Load all meta + photo keys → build app state
async function loadAll() {
  const goalDate   = await dbGet(STORE_META, 'goalDate') || null;
  const photoKeys  = await dbGetAllKeys(STORE_PHOTOS);
  // photoKeys like "2026-04-11_front"
  const photoDates = {};
  for (const k of photoKeys) {
    const [date, type] = k.split('_');
    if (!photoDates[date]) photoDates[date] = {};
    photoDates[date][type] = null; // placeholder; load lazily
  }
  return { goalDate, photos: photoDates };
}

// Save goalDate
async function saveGoalDate(v) { await dbPut(STORE_META, 'goalDate', v); }

// Save photo (file → compress → blob → IDB)
async function savePhoto(dateStr, type, file) {
  const compressed = await compressImageToBlob(file);
  await dbPut(STORE_PHOTOS, `${dateStr}_${type}`, compressed);
}

// Delete one photo
async function deletePhoto(dateStr, type) { await dbDel(STORE_PHOTOS, `${dateStr}_${type}`); }

// Load photo blob → dataURL (for display)
async function loadPhotoURL(dateStr, type) {
  const blob = await dbGet(STORE_PHOTOS, `${dateStr}_${type}`);
  if (!blob) return null;
  return blobToDataURL(blob);
}

// Storage usage estimate
async function getStorageEstimate() {
  if (!navigator.storage || !navigator.storage.estimate) return null;
  const est = await navigator.storage.estimate();
  return { used: est.usage || 0, quota: est.quota || 0 };
}

// ── Helpers ────────────────────────────────────────────────
const toDateStr = (d) => { const y = d.getFullYear(); const m = String(d.getMonth()+1).padStart(2,'0'); const day = String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; };
const today = toDateStr(new Date());
const daysInMonth = (y, m) => new Date(y, m+1, 0).getDate();
const firstDayOf = (y, m) => new Date(y, m, 1).getDay();
const WEEKDAYS = ['일','월','화','수','목','금','토'];
const fmt = (str) => { if (!str) return ''; const [y, m, d] = str.split('-'); return `${y}년 ${parseInt(m)}월 ${parseInt(d)}일`; };

// ── Image compression ──────────────────────────────────────
// Returns dataURL (used by DecorateModal canvas)
const compressImage = (file, maxPx = 900, quality = 0.78) => new Promise((resolve) => {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      let { width: w, height: h } = img;
      if (Math.max(w, h) > maxPx) {
        if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
        else { w = Math.round(w * maxPx / h); h = maxPx; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => resolve(e.target.result);
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
});

// Returns Blob (for IndexedDB storage)
function compressImageToBlob(file, maxPx = 1200, quality = 0.82) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width: w, height: h } = img;
        if (Math.max(w, h) > maxPx) {
          if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
          else { w = Math.round(w * maxPx / h); h = maxPx; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(blob => resolve(blob), 'image/jpeg', quality);
      };
      img.onerror = () => resolve(file); // fallback: original
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── Constants ──────────────────────────────────────────────
const FONTS = [
  { id: 'default',  label: '기본',     sample: '가나다', css: '-apple-system, BlinkMacSystemFont, sans-serif', weight: 'bold' },
  { id: 'serif',    label: '명조',     sample: '가나다', css: 'Georgia, "Batang", serif',                     weight: 'bold' },
  { id: 'heavy',    label: '헤비',     sample: '가나다', css: '-apple-system, BlinkMacSystemFont, sans-serif', weight: 900 },
  { id: 'cursive',  label: '손글씨',   sample: 'abc',   css: 'cursive',                                      weight: 'bold' },
  { id: 'mono',     label: '타이포',   sample: 'ABC',   css: '"Courier New", Courier, monospace',            weight: 'bold' },
];

const TEXT_COLORS = ['#FFD700','#FFFFFF','#FF6B6B','#7C5CFC','#22D3EE','#22C55E','#FF69B4','#FF8C00'];

const STICKERS = [
  '💪','🔥','⭐','🏆','✨','💯','🎯','🌟','😤','🥇',
  '🎉','🙌','👊','✌️','🤸','💃','🕺','🥳','🤩','😍',
  '🦋','🌈','🌸','🍀','🌺','🌻','💐','🎀','💝','🫶',
  '❤️','💖','💎','👑','🔑','⚡','🌙','☀️','🎁','🎊',
  '😎','🥹','💫','🔮','🎵','🍭','🧁','🎂','🥂','❤️‍🔥',
];

const FILTERS = [
  { id: 'none',      label: '원본' },
  { id: 'grayscale', label: '흑백' },
  { id: 'warm',      label: '따뜻' },
  { id: 'cool',      label: '쿨' },
  { id: 'vivid',     label: '선명' },
];
const FILTER_CSS = {
  none: '', grayscale: 'grayscale(100%)',
  warm: 'sepia(40%) saturate(140%) brightness(1.05)',
  cool: 'hue-rotate(30deg) saturate(80%) brightness(0.95)',
  vivid: 'saturate(160%) contrast(110%)',
};

// ── DecorateModal ──────────────────────────────────────────
function DecorateModal({ beforePhotos, afterPhotos, beforeDate, afterDate, onClose }) {
  const canvasRef   = useRef(null);
  const wrapRef     = useRef(null);
  const dragRef     = useRef(null);
  const resizeRef   = useRef(null);
  const idCountRef  = useRef(0);
  const customImgRef = useRef(null);

  const [overlayItems, setOverlayItems] = useState([]);
  const [selectedId,   setSelectedId]   = useState(null);
  const [activeTab,    setActiveTab]     = useState('text');
  const [filter,       setFilter]        = useState('none');
  const [newText,      setNewText]       = useState('');
  const [newFont,      setNewFont]       = useState('default');
  const [newColor,     setNewColor]      = useState('#FFD700');

  const nextId = () => ++idCountRef.current;

  // ── Draw base 2×2 canvas ───────────────────────────────
  const drawBase = useCallback(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const hw = W / 2, hh = H / 2;

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#111'; ctx.fillRect(0, 0, W, H);

    const slots = [
      { src: beforePhotos?.front, x: 0,  y: 0,  w: hw, h: hh, label: '처음 정면' },
      { src: afterPhotos?.front,  x: hw, y: 0,  w: hw, h: hh, label: '현재 정면' },
      { src: beforePhotos?.side,  x: 0,  y: hh, w: hw, h: hh, label: '처음 측면' },
      { src: afterPhotos?.side,   x: hw, y: hh, w: hw, h: hh, label: '현재 측면' },
    ];

    const loadImg = (src) => new Promise(res => {
      if (!src) return res(null);
      const img = new Image();
      img.onload = () => res(img); img.onerror = () => res(null); img.src = src;
    });

    Promise.all(slots.map(s => loadImg(s.src))).then(imgs => {
      imgs.forEach((img, i) => {
        const { x, y, w, h, label } = slots[i];
        ctx.save(); ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip();
        if (img) {
          ctx.filter = FILTER_CSS[filter] || '';
          const ir = img.width / img.height, br = w / h;
          let dw, dh, dx, dy;
          if (ir > br) { dh = h; dw = dh * ir; dx = x + (w - dw) / 2; dy = y; }
          else { dw = w; dh = dw / ir; dx = x; dy = y + (h - dh) / 2; }
          ctx.drawImage(img, dx, dy, dw, dh);
          ctx.filter = 'none';
        } else {
          ctx.fillStyle = '#1a1a2e'; ctx.fillRect(x, y, w, h);
          ctx.fillStyle = '#444'; ctx.font = '13px sans-serif'; ctx.textAlign = 'center';
          ctx.fillText('사진 없음', x + w / 2, y + h / 2); ctx.textAlign = 'left';
        }
        const grad = ctx.createLinearGradient(x, y + h * 0.55, x, y + h);
        grad.addColorStop(0, 'transparent'); grad.addColorStop(1, 'rgba(0,0,0,0.5)');
        ctx.fillStyle = grad; ctx.fillRect(x, y, w, h);
        ctx.restore();
        ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.font = 'bold 12px sans-serif';
        ctx.fillText(label, x + 8, y + h - 10);
      });
      // grid lines
      ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(hw, 0); ctx.lineTo(hw, H); ctx.moveTo(0, hh); ctx.lineTo(W, hh); ctx.stroke();
      // header bands
      const bh = 28;
      ctx.fillStyle = 'rgba(255,80,80,0.72)'; ctx.fillRect(0, 0, hw, bh);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(`BEFORE  ${beforeDate || ''}`, hw / 2, bh - 8);
      ctx.fillStyle = 'rgba(124,92,252,0.72)'; ctx.fillRect(hw, 0, hw, bh);
      ctx.fillStyle = '#fff'; ctx.fillText(`AFTER  ${afterDate || ''}`, hw + hw / 2, bh - 8);
      ctx.textAlign = 'left';
    });
  }, [beforePhotos, afterPhotos, beforeDate, afterDate, filter]);

  useEffect(() => { drawBase(); }, [drawBase]);

  // ── Global pointer drag/resize ─────────────────────────
  useEffect(() => {
    const onMove = (e) => {
      const cx = e.clientX, cy = e.clientY;
      if (dragRef.current) {
        const { id, startX, startY, origX, origY, wrapW, wrapH } = dragRef.current;
        const dx = ((cx - startX) / wrapW) * 100;
        const dy = ((cy - startY) / wrapH) * 100;
        setOverlayItems(prev => prev.map(i =>
          i.id === id ? { ...i, x: Math.max(2, Math.min(98, origX + dx)), y: Math.max(2, Math.min(98, origY + dy)) } : i
        ));
      }
      if (resizeRef.current) {
        const { id, origScale, centerX, centerY, startDist } = resizeRef.current;
        const dist = Math.hypot(cx - centerX, cy - centerY);
        if (startDist > 0) {
          setOverlayItems(prev => prev.map(i =>
            i.id === id ? { ...i, scale: Math.max(0.2, Math.min(6, origScale * dist / startDist)) } : i
          ));
        }
      }
    };
    const onUp = () => { dragRef.current = null; resizeRef.current = null; };
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
    return () => { window.removeEventListener('pointermove', onMove); window.removeEventListener('pointerup', onUp); };
  }, []);

  // Prevent scroll while dragging inside wrap
  useEffect(() => {
    const wrap = wrapRef.current;
    if (!wrap) return;
    const onTouchMove = (e) => { if (dragRef.current || resizeRef.current) e.preventDefault(); };
    wrap.addEventListener('touchmove', onTouchMove, { passive: false });
    return () => wrap.removeEventListener('touchmove', onTouchMove);
  }, []);

  const handleItemPointerDown = (e, id) => {
    e.stopPropagation(); e.preventDefault();
    setSelectedId(id);
    const wrap = wrapRef.current;
    const rect = wrap.getBoundingClientRect();
    const item = overlayItems.find(i => i.id === id);
    if (!item) return;
    dragRef.current = { id, startX: e.clientX, startY: e.clientY, origX: item.x, origY: item.y, wrapW: rect.width, wrapH: rect.height };
  };

  const handleResizePointerDown = (e, id) => {
    e.stopPropagation(); e.preventDefault();
    const wrap = wrapRef.current;
    const rect = wrap.getBoundingClientRect();
    const item = overlayItems.find(i => i.id === id);
    if (!item) return;
    const centerX = rect.left + (item.x / 100) * rect.width;
    const centerY = rect.top  + (item.y / 100) * rect.height;
    const startDist = Math.hypot(e.clientX - centerX, e.clientY - centerY) || 1;
    resizeRef.current = { id, origScale: item.scale, centerX, centerY, startDist };
  };

  // ── Add items ──────────────────────────────────────────
  const addText = () => {
    if (!newText.trim()) return;
    const font = FONTS.find(f => f.id === newFont) || FONTS[0];
    setOverlayItems(prev => [...prev, { id: nextId(), type: 'text', content: newText.trim(), x: 50, y: 50, scale: 1, font: font.css, weight: font.weight, color: newColor }]);
    setNewText('');
  };

  const addSticker = (emoji) => {
    setOverlayItems(prev => [...prev, { id: nextId(), type: 'sticker', content: emoji, x: 30 + Math.random() * 40, y: 30 + Math.random() * 40, scale: 1 }]);
  };

  const addCustomImage = async (file) => {
    const src = await compressImage(file, 400, 0.85);
    setOverlayItems(prev => [...prev, { id: nextId(), type: 'image', content: src, x: 50, y: 50, scale: 1 }]);
  };

  const deleteSelected = () => { setOverlayItems(prev => prev.filter(i => i.id !== selectedId)); setSelectedId(null); };

  // ── Save / Share ───────────────────────────────────────
  const handleSave = async () => {
    const baseCanvas = canvasRef.current;
    const W = 600, H = 600;
    const comp = document.createElement('canvas');
    comp.width = W; comp.height = H;
    const ctx = comp.getContext('2d');
    ctx.drawImage(baseCanvas, 0, 0);

    for (const item of overlayItems) {
      const cx = (item.x / 100) * W;
      const cy = (item.y / 100) * H;
      ctx.save();
      if (item.type === 'text') {
        const size = Math.round(40 * item.scale);
        ctx.font = `${item.weight || 'bold'} ${size}px ${item.font || 'sans-serif'}`;
        ctx.fillStyle = item.color || '#FFD700';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,0.7)'; ctx.shadowBlur = 6;
        ctx.fillText(item.content, cx, cy);
      } else if (item.type === 'sticker') {
        const size = Math.round(58 * item.scale);
        ctx.font = `${size}px sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(item.content, cx, cy);
      } else if (item.type === 'image') {
        const img = new Image();
        await new Promise(res => { img.onload = res; img.onerror = res; img.src = item.content; });
        const size = Math.round(100 * item.scale);
        ctx.drawImage(img, cx - size / 2, cy - size / 2, size, size);
      }
      ctx.restore();
    }

    comp.toBlob(async (blob) => {
      const file = new File([blob], `눈바디비교_${today}.png`, { type: 'image/png' });
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        try { await navigator.share({ files: [file], title: '눈바디 변화 비교' }); return; }
        catch (err) { if (err.name === 'AbortError') return; }
      }
      // fallback: download
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `눈바디비교_${today}.png`; a.click();
      URL.revokeObjectURL(url);
    }, 'image/png');
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal decorate-modal" onClick={e => e.stopPropagation()}>
        <div className="modal-handle" />
        <div className="modal-title">✨ 꾸미기 & 저장</div>

        {/* Canvas + draggable overlay */}
        <div ref={wrapRef} className="decor-wrap" onPointerDown={() => setSelectedId(null)}>
          <canvas ref={canvasRef} width={600} height={600} className="decor-canvas" />
          <div className="decor-overlay">
            {overlayItems.map(item => {
              const isSel = selectedId === item.id;
              return (
                <div
                  key={item.id}
                  className={`overlay-item${isSel ? ' selected' : ''}`}
                  style={{ left: `${item.x}%`, top: `${item.y}%`, transform: `translate(-50%, -50%) scale(${item.scale})` }}
                  onPointerDown={e => handleItemPointerDown(e, item.id)}
                >
                  {item.type === 'text' && (
                    <span style={{ fontSize: 36, fontFamily: item.font, fontWeight: item.weight, color: item.color, textShadow: '0 2px 6px rgba(0,0,0,0.8)', whiteSpace: 'nowrap' }}>
                      {item.content}
                    </span>
                  )}
                  {item.type === 'sticker' && <span style={{ fontSize: 52 }}>{item.content}</span>}
                  {item.type === 'image' && <img src={item.content} style={{ width: 80, height: 80, objectFit: 'contain', borderRadius: 6 }} />}

                  {isSel && (
                    <>
                      <button className="item-delete" onPointerDown={e => e.stopPropagation()} onClick={(e) => { e.stopPropagation(); deleteSelected(); }}>✕ 삭제</button>
                      <div className="resize-handle" onPointerDown={e => handleResizePointerDown(e, item.id)} />
                    </>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        {/* Tabs */}
        <div className="decor-tabs">
          {[['text','📝 문구'],['sticker','😀 스티커'],['image','🖼 사진'],['filter','🎨 필터']].map(([id, label]) => (
            <button key={id} className={`decor-tab${activeTab === id ? ' active' : ''}`} onClick={() => setActiveTab(id)}>{label}</button>
          ))}
        </div>

        {/* 문구 탭 */}
        {activeTab === 'text' && (
          <div>
            <span className="control-label">폰트 선택</span>
            <div className="font-grid">
              {FONTS.map(f => (
                <button key={f.id}
                  className={`font-btn${newFont === f.id ? ' active' : ''}`}
                  style={{ fontFamily: f.css, fontWeight: f.weight }}
                  onClick={() => setNewFont(f.id)}
                >
                  <div>{f.label}</div>
                  <div style={{ fontSize: 15, marginTop: 3 }}>{f.sample}</div>
                </button>
              ))}
            </div>
            <span className="control-label">색상</span>
            <div className="color-row">
              {TEXT_COLORS.map(c => (
                <div key={c} className={`color-swatch${newColor === c ? ' active' : ''}`}
                  style={{ background: c }} onClick={() => setNewColor(c)} />
              ))}
            </div>
            <div className="text-add-row">
              <input className="text-input" type="text" placeholder="문구를 입력하세요"
                value={newText} onChange={e => setNewText(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && addText()} />
              <button className="btn-add-text" onClick={addText}>추가</button>
            </div>
          </div>
        )}

        {/* 스티커 탭 */}
        {activeTab === 'sticker' && (
          <div className="sticker-grid">
            {STICKERS.map((s, i) => (
              <div key={i} className="sticker-item" onClick={() => addSticker(s)}>{s}</div>
            ))}
          </div>
        )}

        {/* 사진 탭 */}
        {activeTab === 'image' && (
          <div>
            <div className="custom-img-zone" onClick={() => customImgRef.current?.click()}>
              <div style={{ fontSize: 32, marginBottom: 8 }}>📷</div>
              <div>사진첩에서 사진 선택</div>
              <div style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 4 }}>선택한 사진이 캔버스 위에 배치됩니다</div>
            </div>
            <input ref={customImgRef} type="file" accept="image/*" style={{ display: 'none' }}
              onChange={e => { if (e.target.files[0]) addCustomImage(e.target.files[0]); e.target.value = ''; }} />
          </div>
        )}

        {/* 필터 탭 */}
        {activeTab === 'filter' && (
          <div className="filter-row">
            {FILTERS.map(f => (
              <button key={f.id} className={`filter-btn${filter === f.id ? ' active' : ''}`}
                onClick={() => setFilter(f.id)}>{f.label}</button>
            ))}
          </div>
        )}

        <button className="btn-save-photo" onClick={handleSave}>
          📱 사진첩에 저장하기
        </button>
      </div>
    </div>
  );
}

// ── StorageModal ────────────────────────────────────────────
function StorageModal({ onClose, onDeleteAll }) {
  const [usage, setUsage] = React.useState(null);
  const [confirm, setConfirm] = React.useState(false);
  const [deleting, setDeleting] = React.useState(false);

  React.useEffect(() => {
    if (navigator.storage && navigator.storage.estimate) {
      navigator.storage.estimate().then(est => setUsage(est));
    }
  }, []);

  function fmtBytes(bytes) {
    if (bytes == null) return '알 수 없음';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  async function handleDelete() {
    setDeleting(true);
    await onDeleteAll();
    setDeleting(false);
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:360}} onClick={e => e.stopPropagation()}>
        <div className="modal-handle" />
        <h3 style={{margin:'0 0 16px',fontSize:17,fontWeight:700}}>💾 저장공간 관리</h3>

        <div style={{background:'#f5f5f5',borderRadius:12,padding:'14px 16px',marginBottom:16}}>
          <div style={{fontSize:13,color:'#888',marginBottom:6}}>현재 사용량</div>
          {usage ? (
            <>
              <div style={{fontSize:22,fontWeight:700,color:'#222'}}>
                {fmtBytes(usage.usage)}
              </div>
              {usage.quota && (
                <div style={{fontSize:12,color:'#aaa',marginTop:4}}>
                  최대 {fmtBytes(usage.quota)} 중
                </div>
              )}
            </>
          ) : (
            <div style={{fontSize:14,color:'#aaa'}}>측정 중...</div>
          )}
        </div>

        <div style={{background:'#fffbe6',border:'1px solid #ffe58f',borderRadius:10,padding:'10px 14px',marginBottom:20,fontSize:12,color:'#7a6a00',lineHeight:1.6}}>
          📱 사진 데이터는 이 기기의 브라우저에만 저장됩니다. 브라우저를 변경하거나 데이터를 삭제하면 복구할 수 없습니다.
        </div>

        {!confirm ? (
          <button
            onClick={() => setConfirm(true)}
            style={{width:'100%',padding:'13px',background:'#ff4d4f',color:'#fff',border:'none',borderRadius:12,fontSize:15,fontWeight:600,cursor:'pointer'}}
          >
            모든 데이터 삭제
          </button>
        ) : (
          <div style={{border:'1px solid #ffccc7',borderRadius:12,padding:16,textAlign:'center'}}>
            <p style={{margin:'0 0 14px',fontSize:14,color:'#cf1322',fontWeight:600}}>
              정말 삭제하시겠어요?<br/>
              <span style={{fontWeight:400,color:'#888'}}>모든 사진과 설정이 영구 삭제됩니다.</span>
            </p>
            <div style={{display:'flex',gap:10}}>
              <button
                onClick={() => setConfirm(false)}
                style={{flex:1,padding:'11px',background:'#f0f0f0',border:'none',borderRadius:10,fontSize:14,cursor:'pointer'}}
              >취소</button>
              <button
                onClick={handleDelete}
                disabled={deleting}
                style={{flex:1,padding:'11px',background:'#ff4d4f',color:'#fff',border:'none',borderRadius:10,fontSize:14,fontWeight:600,cursor:'pointer'}}
              >{deleting ? '삭제 중...' : '삭제'}</button>
            </div>
          </div>
        )}

        <button onClick={onClose} style={{width:'100%',marginTop:12,padding:'13px',background:'#f0f0f0',border:'none',borderRadius:12,fontSize:15,cursor:'pointer'}}>
          닫기
        </button>
      </div>
    </div>
  );
}

// ── App ────────────────────────────────────────────────────
function App() {
  const [showSplash,    setShowSplash]    = useState(true);
  const [showAbout,     setShowAbout]     = useState(false);
  const [showStorage,   setShowStorage]   = useState(false);
  const [goalDate,      setGoalDateState] = useState(null);
  // photoDates: { "2026-04-11": { front: true/false, side: true/false } }
  const [photoDates,    setPhotoDates]    = useState({});
  // photoURLs: { "2026-04-11_front": dataURL, ... } — loaded on demand
  const [photoURLs,     setPhotoURLs]     = useState({});
  const [dbReady,       setDbReady]       = useState(false);

  const [calYear,       setCalYear]       = useState(() => new Date().getFullYear());
  const [calMonth,      setCalMonth]      = useState(() => new Date().getMonth());
  const [selectedDate,  setSelectedDate]  = useState(null);
  const [showGoalModal, setShowGoalModal] = useState(false);
  const [showDecorate,  setShowDecorate]  = useState(false);
  const [beforeDate,    setBeforeDate]    = useState(null);
  const [afterDate,     setAfterDate]     = useState(null);
  const [selectingFor,  setSelectingFor]  = useState(null);

  const frontRef = useRef(null);
  const sideRef  = useRef(null);

  // ── Boot: load from IndexedDB ────────────────────────────
  useEffect(() => {
    loadAll().then(({ goalDate: gd, photos }) => {
      setGoalDateState(gd);
      setPhotoDates(photos);
      setDbReady(true);
    }).catch(err => {
      console.warn('IndexedDB load failed', err);
      setDbReady(true);
    });
  }, []);

  // ── Load photo URL on demand ─────────────────────────────
  const ensurePhotoURL = useCallback(async (dateStr, type) => {
    const key = `${dateStr}_${type}`;
    if (photoURLs[key]) return photoURLs[key];
    const url = await loadPhotoURL(dateStr, type);
    if (url) setPhotoURLs(prev => ({ ...prev, [key]: url }));
    return url;
  }, [photoURLs]);

  const getPhotoURL = (dateStr, type) => photoURLs[`${dateStr}_${type}`] || null;

  // ── Before/After auto-default ────────────────────────────
  const photoDatesSorted = useMemo(() => Object.keys(photoDates).sort(), [photoDates]);

  useEffect(() => {
    if (photoDatesSorted.length === 0) { setBeforeDate(null); setAfterDate(null); return; }
    const first = photoDatesSorted[0];
    const last  = photoDatesSorted[photoDatesSorted.length - 1];
    setBeforeDate(prev => prev && photoDates[prev] ? prev : first);
    setAfterDate(prev  => prev && photoDates[prev] ? prev : last);
  }, [photoDatesSorted]);

  // ── Load URLs when comparison dates change ───────────────
  useEffect(() => {
    if (beforeDate) { ensurePhotoURL(beforeDate,'front'); ensurePhotoURL(beforeDate,'side'); }
    if (afterDate)  { ensurePhotoURL(afterDate,'front');  ensurePhotoURL(afterDate,'side');  }
  }, [beforeDate, afterDate]);

  useEffect(() => {
    if (selectedDate) { ensurePhotoURL(selectedDate,'front'); ensurePhotoURL(selectedDate,'side'); }
  }, [selectedDate]);

  useEffect(() => {
    ensurePhotoURL(today,'front'); ensurePhotoURL(today,'side');
  }, [photoDates]);

  // ── Countdown ────────────────────────────────────────────
  const countdown = useMemo(() => {
    if (!goalDate) return null;
    const goal = new Date(goalDate + 'T00:00:00');
    const now  = new Date(today + 'T00:00:00');
    return Math.round((goal - now) / 86400000);
  }, [goalDate]);

  // ── Upload ───────────────────────────────────────────────
  const handleUpload = async (type, file) => {
    if (!file) return;
    await savePhoto(today, type, file);
    const url = await loadPhotoURL(today, type);
    setPhotoDates(prev => ({
      ...prev,
      [today]: { ...(prev[today] || {}), [type]: true }
    }));
    if (url) setPhotoURLs(prev => ({ ...prev, [`${today}_${type}`]: url }));
  };

  // ── Goal date ────────────────────────────────────────────
  const handleSaveGoal = async (d) => {
    await saveGoalDate(d);
    setGoalDateState(d);
  };

  // ── Delete single photo ──────────────────────────────────
  const handleDeletePhoto = async (dateStr, type) => {
    await deletePhoto(dateStr, type);
    setPhotoDates(prev => {
      const d = { ...prev };
      if (d[dateStr]) {
        const updated = { ...d[dateStr] };
        delete updated[type];
        if (Object.keys(updated).length === 0) delete d[dateStr];
        else d[dateStr] = updated;
      }
      return d;
    });
    setPhotoURLs(prev => { const u = { ...prev }; delete u[`${dateStr}_${type}`]; return u; });
  };

  // ── Calendar ─────────────────────────────────────────────
  const prevMonth = () => { if (calMonth === 0) { setCalYear(y => y-1); setCalMonth(11); } else setCalMonth(m => m-1); };
  const nextMonth = () => { if (calMonth === 11) { setCalYear(y => y+1); setCalMonth(0); }  else setCalMonth(m => m+1); };

  const calDays = useMemo(() => {
    const total = daysInMonth(calYear, calMonth);
    const first = firstDayOf(calYear, calMonth);
    const cells = [];
    for (let i = 0; i < first; i++) cells.push(null);
    for (let d = 1; d <= total; d++) {
      const str = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      cells.push({ d, str });
    }
    return cells;
  }, [calYear, calMonth]);

  const handleDayClick = (str, hasPhoto) => {
    if (selectingFor) {
      if (hasPhoto) {
        if (selectingFor === 'before') setBeforeDate(str);
        else setAfterDate(str);
        setSelectingFor(null); setSelectedDate(null);
      }
    } else {
      if (hasPhoto || goalDate === str) setSelectedDate(prev => prev === str ? null : str);
    }
  };

  // ── Photo helpers ────────────────────────────────────────
  const todayInfo    = photoDates[today] || {};
  const beforePhotos = beforeDate ? { front: getPhotoURL(beforeDate,'front'), side: getPhotoURL(beforeDate,'side') } : null;
  const afterPhotos  = afterDate  ? { front: getPhotoURL(afterDate,'front'),  side: getPhotoURL(afterDate,'side')  } : null;
  const hasComparison = beforeDate && photoDates[beforeDate] || afterDate && photoDates[afterDate];

  const countdownLabel = countdown === null ? null : countdown > 0 ? `D-${countdown}` : countdown === 0 ? 'D-Day! 🎉' : `D+${Math.abs(countdown)}`;
  const countdownClass = countdown === null ? '' : countdown <= 0 ? 'achieved' : countdown <= 7 ? 'urgent' : '';

  if (!dbReady) return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'center', height:'100vh', flexDirection:'column', gap:16 }}>
      <div style={{ fontSize:40 }}><EyeLogo size={56} /></div>
      <div style={{ color:'var(--text-dim)', fontSize:14 }}>불러오는 중...</div>
    </div>
  );

  return (
    <div>
      {/* SPLASH */}
      {showSplash && <SplashScreen onDone={() => setShowSplash(false)} />}

      {/* HEADER */}
      <div className="header">
        <div className="header-row">
          <div className="app-brand">
            <div className="app-logo"><EyeLogo size={42} /></div>
            <div><div className="app-title">EYEBODY</div><div className="app-sub">매일 기록하는 나의 변화</div></div>
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            {countdownLabel && (
              <div className={`countdown-badge ${countdownClass}`} onClick={() => setShowGoalModal(true)}>{countdownLabel}</div>
            )}
            <button onClick={() => setShowStorage(true)} style={{ background:'rgba(255,255,255,0.08)', border:'1px solid rgba(255,255,255,0.15)', borderRadius:10, width:36, height:36, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', fontSize:18 }} title="저장공간 관리">⚙️</button>
          </div>
        </div>
      </div>

      {/* GOAL BAR */}
      <div className="goal-bar">
        <div className="goal-bar-left">
          <span className="goal-emoji">🎯</span>
          <div className="goal-info">
            <div className="goal-label">목표일</div>
            {goalDate
              ? <div className="goal-date-val">{fmt(goalDate)}</div>
              : <div className="goal-date-val" style={{ color:'var(--text-muted)' }}>설정되지 않음</div>
            }
          </div>
        </div>
        {goalDate
          ? <button className="btn-change" onClick={() => setShowGoalModal(true)}>변경</button>
          : <button className="btn-set-goal" onClick={() => setShowGoalModal(true)}>목표일 설정</button>
        }
      </div>

      {/* UPLOAD */}
      <div className="section">
        <div className="section-title">
          📸 오늘의 눈바디
          <span className="badge">
            {!todayInfo.front && !todayInfo.side ? '미완료' : todayInfo.front && todayInfo.side ? '완료 ✓' : '1/2'}
          </span>
        </div>
        <div className="upload-card-wrapper">
          <div className="upload-date-row">
            <span className="upload-date-label">촬영 날짜</span>
            <span className="upload-date-val">{fmt(today)}</span>
          </div>
          <div className="upload-grid">
            {['front','side'].map(type => {
              const url = getPhotoURL(today, type);
              return (
                <div key={type} className={`upload-zone${url ? ' has-photo' : ''}`} onClick={() => type==='front' ? frontRef.current?.click() : sideRef.current?.click()}>
                  {url
                    ? (<><img src={url} alt={type} className="preview-img" /><div className="photo-overlay"><span className="re-upload-label">📷 다시 찍기</span></div></>)
                    : (<div className="upload-placeholder"><div className="upload-plus">+</div><div className="upload-type-label">{type==='front'?'정면':'측면'}</div><div className="upload-hint">탭하여 업로드</div></div>)
                  }
                </div>
              );
            })}
            <input ref={frontRef} type="file" accept="image/*" style={{ display:'none' }} onChange={e => { handleUpload('front', e.target.files[0]); e.target.value=''; }} />
            <input ref={sideRef}  type="file" accept="image/*" style={{ display:'none' }} onChange={e => { handleUpload('side',  e.target.files[0]); e.target.value=''; }} />
          </div>
        </div>
      </div>

      {/* CALENDAR */}
      <div className="section">
        <div className="section-title">
          📅 기록 캘린더
          {goalDate && countdown !== null && (
            <span className="badge">{countdown > 0 ? `${countdown}일 남음` : countdown === 0 ? 'D-Day' : `${Math.abs(countdown)}일 지남`}</span>
          )}
        </div>
        <div className="calendar-card">
          {selectingFor && (
            <div className="select-mode-banner">
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <span className={`select-mode-badge ${selectingFor}`}>{selectingFor === 'before' ? 'BEFORE' : 'AFTER'}</span>
                <span style={{ color:'var(--text-dim)', fontSize:13 }}>사진 있는 날짜를 선택하세요</span>
              </div>
              <button className="btn-cancel-select" onClick={() => setSelectingFor(null)}>취소</button>
            </div>
          )}
          <div className="cal-header">
            <button className="cal-nav" onClick={prevMonth}>‹</button>
            <span className="cal-title">{calYear}년 {calMonth+1}월</span>
            <button className="cal-nav" onClick={nextMonth}>›</button>
          </div>
          <div className="cal-weekdays">{WEEKDAYS.map(w => <div key={w} className="cal-weekday">{w}</div>)}</div>
          <div className="cal-grid">
            {calDays.map((cell, i) => {
              if (!cell) return <div key={`e${i}`} className="cal-day empty" />;
              const { d, str } = cell;
              const hasPhoto = !!photoDates[str];
              const isGoal   = goalDate === str;
              const isToday  = str === today;
              const isSel    = selectedDate === str;
              const cls = ['cal-day', isToday ? 'is-today' : '', isSel ? 'is-selected' : '', isGoal ? 'is-goal' : '',
                selectingFor && hasPhoto ? 'selectable' : '',
                !selectingFor && str === beforeDate && hasPhoto ? 'is-before-pick' : '',
                !selectingFor && str === afterDate  && hasPhoto ? 'is-after-pick'  : '',
              ].filter(Boolean).join(' ');
              return (
                <div key={str} className={cls} onClick={() => handleDayClick(str, hasPhoto)}>
                  <span className="day-num">{d}</span>
                  <div className="day-dot-row">
                    {photoDates[str]?.front && <div className="day-dot" style={{ background:'var(--purple)' }} />}
                    {photoDates[str]?.side  && <div className="day-dot" style={{ background:'var(--pink)' }} />}
                  </div>
                  {isGoal && <div className="goal-flag">🎯</div>}
                </div>
              );
            })}
          </div>
          {selectedDate && !selectingFor && (
            <div className="selected-panel">
              <div className="selected-panel-title">📌 <strong>{fmt(selectedDate)}</strong> 기록</div>
              {photoDates[selectedDate]
                ? <div className="selected-photos-grid">
                    {['front','side'].map(type => {
                      const url = getPhotoURL(selectedDate, type);
                      return url
                        ? <img key={type} src={url} alt={type} className="selected-photo" />
                        : <div key={type} className="selected-no-photo">{type==='front'?'정면 없음':'측면 없음'}</div>;
                    })}
                  </div>
                : <div style={{ textAlign:'center', color:'var(--text-muted)', fontSize:14, padding:'8px 0' }}>
                    {selectedDate === goalDate ? '🎯 목표일입니다!' : '기록 없음'}
                  </div>
              }
            </div>
          )}
        </div>
      </div>

      {/* COMPARISON */}
      <div className="section">
        <div className="section-title">💪 Before &amp; After 비교</div>
        <div className="comparison-card">
          {hasComparison ? (
            <>
              <div className="comparison-header-row">
                <div className="comp-col-label before">
                  <div className="comp-col-info">
                    <span className="comp-col-title">BEFORE</span>
                    <span className="comp-col-date">{beforeDate || '—'}</span>
                  </div>
                  <button className={`btn-pick-date${selectingFor==='before' ? ' active-before':''}`}
                    onClick={() => setSelectingFor(p => p==='before' ? null : 'before')}>
                    {selectingFor==='before' ? '취소' : '날짜 선택'}
                  </button>
                </div>
                <div className="comp-col-label after">
                  <div className="comp-col-info">
                    <span className="comp-col-title">AFTER</span>
                    <span className="comp-col-date">{afterDate || '—'}</span>
                  </div>
                  <button className={`btn-pick-date${selectingFor==='after' ? ' active-after':''}`}
                    onClick={() => setSelectingFor(p => p==='after' ? null : 'after')}>
                    {selectingFor==='after' ? '취소' : '날짜 선택'}
                  </button>
                </div>
              </div>
              <div className="comparison-grid">
                {[{p:beforePhotos,l:'처음 정면',t:'정면'},{p:afterPhotos,l:'현재 정면',t:'정면'},{p:beforePhotos,l:'처음 측면',t:'측면'},{p:afterPhotos,l:'현재 측면',t:'측면'}].map((it,i) => {
                  const src = i<2 ? it.p?.front : it.p?.side;
                  return <div key={i} className="comp-cell">{src ? <><img src={src} alt={it.l} /><span className="comp-row-label">{it.t}</span></> : <div className="comp-cell-empty"><span>📷</span>{it.t} 없음</div>}</div>;
                })}
              </div>
              <div className="comparison-actions">
                <button className="btn-primary" onClick={() => setShowDecorate(true)}>✨ 꾸미기 &amp; 저장</button>
              </div>
            </>
          ) : (
            <div className="empty-comparison">
              <div className="empty-icon">🏋️</div>
              <div className="empty-text">사진을 올리면 처음과 현재를<br />한 눈에 비교할 수 있어요!</div>
              <div className="empty-hint">정면 · 측면 사진 2장을 매일 기록해 보세요</div>
            </div>
          )}
        </div>
      </div>

      {/* BOTTOM LINKS */}
      <div style={{ margin:'4px 16px 0', display:'flex', justifyContent:'center', gap:24 }}>
        <button onClick={() => setShowAbout(true)}
          style={{ background:'none', border:'none', cursor:'pointer', color:'var(--text-muted)', fontSize:13, padding:'12px 0', textDecoration:'underline', textDecorationColor:'var(--border)' }}>
          ℹ️ EYEBODY 소개
        </button>
        <button onClick={() => setShowStorage(true)}
          style={{ background:'none', border:'none', cursor:'pointer', color:'var(--text-muted)', fontSize:13, padding:'12px 0', textDecoration:'underline', textDecorationColor:'var(--border)' }}>
          💾 저장공간 관리
        </button>
      </div>
      <div style={{ height:24 }} />

      {/* ── MODALS ── */}
      {showAbout && (
        <div className="modal-overlay" onClick={() => setShowAbout(false)}>
          <div className="modal" style={{ maxHeight:'90vh', overflowY:'auto', paddingBottom:40 }} onClick={e => e.stopPropagation()}>
            <div className="modal-handle" />
            <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:12, marginBottom:20 }}>
              <EyeLogo size={40} />
              <div style={{ fontSize:22, fontWeight:900, letterSpacing:2, color:'#fff' }}>EYEBODY</div>
            </div>
            <div style={{ fontSize:13, color:'var(--text-dim)', textAlign:'center', marginBottom:24, lineHeight:1.6 }}>Transform your journey with visual feedback.</div>
            <AboutSection />
            <button onClick={() => setShowAbout(false)}
              style={{ width:'100%', marginTop:24, background:'var(--card)', border:'1px solid var(--border)', borderRadius:12, padding:'13px', color:'var(--text-dim)', fontSize:15, cursor:'pointer' }}>닫기</button>
          </div>
        </div>
      )}

      {showStorage && (
        <StorageModal
          onClose={() => setShowStorage(false)}
          onDeleteAll={async () => {
            await dbClearAll();
            setGoalDateState(null);
            setPhotoDates({});
            setPhotoURLs({});
            setBeforeDate(null);
            setAfterDate(null);
            setShowStorage(false);
          }}
        />
      )}

      {showGoalModal && (
        <GoalModal current={goalDate} onSave={handleSaveGoal} onClose={() => setShowGoalModal(false)} />
      )}
      {showDecorate && (
        <DecorateModal beforePhotos={beforePhotos} afterPhotos={afterPhotos} beforeDate={beforeDate} afterDate={afterDate} onClose={() => setShowDecorate(false)} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
